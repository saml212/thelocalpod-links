<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Local — Bay Area Podcast</title>
<meta name="description" content="The Local: a Bay Area interview podcast exploring the people, culture, and stories that make San Francisco what it is.">
<meta property="og:title" content="The Local — Bay Area Podcast">
<meta property="og:description" content="Culture. Tech. Politics. The people who make this city.">
<meta property="og:type" content="website">
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --amber: #ffb347;
    --cream: #f5deb3;
    --neon-pink: #ff6ec7;
    --neon-blue: #00f0ff;
    --neon-yellow: #fff700;
    --neon-orange: #ff9900;
    --neon-green: #39ff14;
    --terminal-bg: #0a0a0a;
    --scanline-opacity: 0.02;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--terminal-bg);
    color: var(--cream);
    font-family: 'VT323', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* CRT scanlines — subtle warm tint */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255, 179, 71, var(--scanline-opacity)) 2px,
      rgba(255, 179, 71, var(--scanline-opacity)) 4px
    );
    pointer-events: none;
    z-index: 1000;
    animation: flicker 0.15s infinite;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 999;
  }

  @keyframes flicker {
    0% { opacity: 0.97; }
    50% { opacity: 1; }
    100% { opacity: 0.98; }
  }

  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  @keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(-2px, -2px); }
    60% { transform: translate(2px, 2px); }
    80% { transform: translate(2px, -2px); }
    100% { transform: translate(0); }
  }

  @keyframes rainbow {
    0% { color: var(--amber); }
    16% { color: var(--neon-blue); }
    33% { color: var(--neon-pink); }
    50% { color: var(--neon-yellow); }
    66% { color: var(--neon-orange); }
    83% { color: var(--neon-blue); }
    100% { color: var(--amber); }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    25% { transform: translateY(-10px) rotate(2deg); }
    75% { transform: translateY(5px) rotate(-1deg); }
  }

  @keyframes marquee {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
  }

  @keyframes pulse-glow {
    0%, 100% { text-shadow: 0 0 5px currentColor, 0 0 10px currentColor; }
    50% { text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 40px currentColor; }
  }

  @keyframes photo-glow {
    0%, 100% { box-shadow: 0 0 15px rgba(255, 179, 71, 0.3), 0 0 30px rgba(255, 179, 71, 0.1); }
    50% { box-shadow: 0 0 20px rgba(255, 179, 71, 0.5), 0 0 40px rgba(255, 179, 71, 0.2), 0 0 60px rgba(255, 179, 71, 0.1); }
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }

  .stars {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 30px 20px 60px;
    position: relative;
    z-index: 10;
  }

  /* Marquee banner — warm amber instead of green */
  .marquee-bar {
    background: var(--amber);
    color: var(--terminal-bg);
    font-size: 14px;
    font-family: 'Space Mono', monospace;
    padding: 4px 0;
    overflow: hidden;
    white-space: nowrap;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 500;
  }
  .marquee-bar span {
    display: inline-block;
    animation: marquee 180s linear infinite;
  }

  /* Hit counter */
  .hit-counter {
    text-align: center;
    margin-top: 30px;
    font-size: 14px;
    font-family: 'Space Mono', monospace;
    color: #666;
  }
  .hit-counter .count {
    background: #111;
    border: 1px solid #333;
    padding: 2px 8px;
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--amber);
    letter-spacing: 3px;
  }

  /* Profile photo */
  .profile-photo {
    text-align: center;
    margin: 20px 0 8px;
    position: relative;
  }
  .profile-photo img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 3px solid var(--amber);
    object-fit: cover;
    animation: photo-glow 4s ease-in-out infinite;
    transition: transform 0.3s, filter 0.3s;
    /* Subtle CRT warmth */
    filter: contrast(1.08) saturate(0.85) brightness(0.95);
  }
  /* Subtle scanline overlay on photo */
  .profile-photo::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 150px;
    height: 150px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(255, 179, 71, 0.06) 3px,
      rgba(255, 179, 71, 0.06) 4px
    );
    pointer-events: none;
    z-index: 1;
    mix-blend-mode: overlay;
  }
  .profile-photo img:hover {
    transform: scale(1.05);
    filter: contrast(1.1) saturate(1.1);
    animation: photo-glow 1.5s ease-in-out infinite;
  }
  .profile-photo .host-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #777;
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 3px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 16px;
    padding-top: 8px;
  }
  .header h1 {
    font-size: 52px;
    animation: rainbow 6s linear infinite, float 4s ease-in-out infinite;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .header .tagline {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: #999;
    margin-top: 6px;
  }
  .header .tagline .cursor {
    animation: blink 1s step-end infinite;
    color: var(--amber);
  }

  /* Greeting message */
  .greeting {
    text-align: center;
    font-size: 20px;
    margin: 16px 0 24px;
    color: var(--neon-pink);
    animation: pulse-glow 3s ease-in-out infinite;
  }

  /* Spotify embed */
  .player-section {
    margin: 20px 0;
    border: 1px solid #333;
    padding: 12px;
    background: rgba(30, 215, 96, 0.05);
    position: relative;
  }
  .player-section .label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #1DB954;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .player-section iframe {
    border-radius: 4px;
  }

  /* Links */
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 20px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    border: 1px solid;
    text-decoration: none;
    font-family: 'VT323', monospace;
    font-size: 22px;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .link-btn::before {
    content: '>';
    font-size: 18px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .link-btn:hover::before { opacity: 1; }
  .link-btn:hover {
    padding-left: 28px;
    text-shadow: 0 0 8px currentColor;
    box-shadow: 0 0 15px currentColor, inset 0 0 15px rgba(255,255,255,0.05);
  }

  .link-btn .icon { font-size: 24px; }

  .link-btn.spotify { color: #1DB954; border-color: #1DB954; }
  .link-btn.youtube { color: #FF0000; border-color: #FF0000; }
  .link-btn.tiktok { color: var(--neon-pink); border-color: var(--neon-pink); }
  .link-btn.instagram { color: var(--neon-orange); border-color: var(--neon-orange); }
  .link-btn.twitter { color: var(--neon-blue); border-color: var(--neon-blue); }
  .link-btn.github { color: #fff; border-color: #fff; }

  /* Under construction */
  .construction {
    text-align: center;
    margin: 30px 0 10px;
    font-size: 14px;
    color: var(--neon-yellow);
    animation: blink 1.5s step-end infinite;
  }

  /* ASCII art divider */
  .divider {
    text-align: center;
    font-size: 12px;
    color: #444;
    margin: 20px 0;
    font-family: 'Space Mono', monospace;
    user-select: none;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 30px;
    font-size: 13px;
    font-family: 'Space Mono', monospace;
    color: #555;
  }
  .footer a {
    color: var(--amber);
    text-decoration: none;
  }
  .footer a:hover { text-decoration: underline; }

  /* Floating decorations */
  .deco {
    position: fixed;
    font-size: 24px;
    opacity: 0.15;
    animation: float 6s ease-in-out infinite;
    pointer-events: none;
    z-index: 5;
  }

  /* Mobile */
  @media (max-width: 520px) {
    .container { padding: 24px 16px 50px; }
    .header h1 { font-size: 36px; letter-spacing: 2px; }
    .link-btn { font-size: 19px; padding: 12px 14px; }
    .profile-photo img { width: 120px; height: 120px; }
    .profile-photo::after { width: 120px; height: 120px; }
    .greeting { font-size: 18px; }
    .marquee-bar { font-size: 12px; }
  }

  @media (max-width: 360px) {
    .header h1 { font-size: 30px; }
    .profile-photo img { width: 100px; height: 100px; }
    .profile-photo::after { width: 100px; height: 100px; }
    .link-btn { font-size: 17px; padding: 10px 12px; }
  }
</style>
</head>

  { name: 'TikTok', icon: '\ud83c\udfb5', url: 'https://www.tiktok.com/@the_local_pod', cls: 'tiktok' },
  { name: 'Instagram', icon: '\ud83d\udcf8', url: 'https://www.instagram.com/the_local_pod/', cls: 'instagram' },
  { name: 'X / Twitter', icon: '\ud83d\udc26', url: 'https://x.com/the_local_pod', cls: 'twitter' },

];

// ============================================================
// RENDER
// ============================================================

// Stars background
(function renderStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() < 0.3 ? 2 : 1;
    star.style.cssText = 'width:' + size + 'px;height:' + size + 'px;top:' + (Math.random()*100) + '%;left:' + (Math.random()*100) + '%;--dur:' + (2+Math.random()*4) + 's;animation-delay:' + (Math.random()*3) + 's;';
    container.appendChild(star);
  }
})();

// Floating emoji decorations
(function renderDecos() {
  const used = new Set();
  for (let i = 0; i < 5; i++) {
    let emoji;
    do { emoji = pick(decoEmojis); } while (used.has(emoji));
    used.add(emoji);
    const el = document.createElement('div');
    el.className = 'deco';
    el.textContent = emoji;
    el.style.cssText = 'top:' + (10+Math.random()*70) + '%;left:' + (5+Math.random()*85) + '%;animation-delay:' + (Math.random()*3) + 's;animation-duration:' + (5+Math.random()*4) + 's;font-size:' + (20+Math.random()*20) + 'px;opacity:' + (0.06+Math.random()*0.12) + ';';
    document.body.appendChild(el);
  }
})();

// Greeting with random accent color
var greetEl = document.getElementById('greeting');
greetEl.textContent = pick(greetings);
greetEl.style.color = pick(greetingColors);

// Host label (randomized)
document.getElementById('host-label').textContent = pick(hostLabels);

// Tagline (typing effect)
var tagline = pick(taglines);
var taglineEl = document.getElementById('tagline-text');
var ti = 0;
(function typeTagline() {
  if (ti <= tagline.length) {
    taglineEl.textContent = tagline.slice(0, ti);
    ti++;
    setTimeout(typeTagline, 50 + Math.random() * 40);
  }
})();

// Marquee — THE MANIFESTO (one continuous scroll, Dr. Bronner's style)
document.getElementById('marquee-text').textContent = manifesto;

// Visitor counter (randomized base)
(function renderCounter() {
  var base = 48213 + randInt(0, 500);
  document.getElementById('visitor-count').textContent = String(base).padStart(6, '0');
})();

// Links — primary always on top, secondary shuffled
(function renderLinks() {
  var container = document.getElementById('links');
  var shuffled = secondaryLinks.slice().sort(function() { return Math.random() - 0.5; });
  var all = primaryLinks.concat(shuffled);
  all.forEach(function(link, i) {
    var a = document.createElement('a');
    a.href = link.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.className = 'link-btn ' + link.cls;
    a.innerHTML = '<span class="icon">' + link.icon + '</span> ' + link.name;
    a.style.animationDelay = (i * 0.1) + 's';
    container.appendChild(a);
  });
})();

// Random starting point for rainbow title animation
(function randomAccent() {
  var h1 = document.querySelector('.header h1');
  h1.style.animationDelay = '-' + (Math.random() * 6) + 's';
})();

// Random photo border color from palette
(function randomPhotoBorder() {
  var colors = ['#ffb347', '#ff6ec7', '#00f0ff', '#fff700', '#ff9900'];
  var img = document.getElementById('host-photo');
  var color = pick(colors);
  img.style.borderColor = color;
  img.style.boxShadow = '0 0 15px ' + color + '4d, 0 0 30px ' + color + '1a';
})();

// Easter egg: Konami code
(function konamiEgg() {
  var code = [38,38,40,40,37,39,37,39,66,65];
  var pos = 0;
  document.addEventListener('keydown', function(e) {
    if (e.keyCode === code[pos]) {
      pos++;
      if (pos === code.length) {
        var msg = document.createElement('div');
        msg.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#000;border:2px solid var(--amber);padding:30px;z-index:9999;text-align:center;font-family:VT323,monospace;font-size:24px;color:var(--amber);';
        msg.innerHTML = '\ud83c\udf09 YOU FOUND THE SECRET \ud83c\udf09<br><br>The Bay Area thanks you.<br>Now go listen to an episode.<br><br><small>(click to close)</small>';
        msg.onclick = function() { msg.remove(); };
        document.body.appendChild(msg);
        pos = 0;
      }
    } else { pos = 0; }
  });
})();
</script>
