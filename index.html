<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Local — Bay Area Podcast</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --neon-green: #39ff14;
    --neon-pink: #ff6ec7;
    --neon-blue: #00f0ff;
    --neon-yellow: #fff700;
    --neon-orange: #ff9900;
    --terminal-bg: #0a0a0a;
    --scanline-opacity: 0.03;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--terminal-bg);
    color: var(--neon-green);
    font-family: 'VT323', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* CRT scanlines */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 255, 0, var(--scanline-opacity)) 2px,
      rgba(0, 255, 0, var(--scanline-opacity)) 4px
    );
    pointer-events: none;
    z-index: 1000;
    animation: flicker 0.15s infinite;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 999;
  }

  @keyframes flicker {
    0% { opacity: 0.97; }
    50% { opacity: 1; }
    100% { opacity: 0.98; }
  }

  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  @keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(-2px, -2px); }
    60% { transform: translate(2px, 2px); }
    80% { transform: translate(2px, -2px); }
    100% { transform: translate(0); }
  }

  @keyframes typing {
    from { width: 0; }
    to { width: 100%; }
  }

  @keyframes rainbow {
    0% { color: var(--neon-green); }
    16% { color: var(--neon-blue); }
    33% { color: var(--neon-pink); }
    50% { color: var(--neon-yellow); }
    66% { color: var(--neon-orange); }
    83% { color: var(--neon-blue); }
    100% { color: var(--neon-green); }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    25% { transform: translateY(-10px) rotate(2deg); }
    75% { transform: translateY(5px) rotate(-1deg); }
  }

  @keyframes marquee {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
  }

  @keyframes pulse-glow {
    0%, 100% { text-shadow: 0 0 5px currentColor, 0 0 10px currentColor; }
    50% { text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 40px currentColor; }
  }

  .stars {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 30px 20px 60px;
    position: relative;
    z-index: 10;
  }

  /* Marquee banner */
  .marquee-bar {
    background: var(--neon-green);
    color: var(--terminal-bg);
    font-size: 14px;
    font-family: 'Space Mono', monospace;
    padding: 4px 0;
    overflow: hidden;
    white-space: nowrap;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 500;
  }
  .marquee-bar span {
    display: inline-block;
    animation: marquee 20s linear infinite;
  }

  /* Hit counter */
  .hit-counter {
    text-align: center;
    margin-top: 30px;
    font-size: 14px;
    font-family: 'Space Mono', monospace;
    color: #666;
  }
  .hit-counter .count {
    background: #111;
    border: 1px solid #333;
    padding: 2px 8px;
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--neon-green);
    letter-spacing: 3px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 24px;
    padding-top: 16px;
  }
  .header h1 {
    font-size: 52px;
    animation: rainbow 6s linear infinite, float 4s ease-in-out infinite;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .header .tagline {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: #888;
    margin-top: 6px;
  }
  .header .tagline .cursor {
    animation: blink 1s step-end infinite;
  }

  /* Greeting message — randomized */
  .greeting {
    text-align: center;
    font-size: 20px;
    margin: 16px 0 24px;
    animation: pulse-glow 3s ease-in-out infinite;
  }

  /* Spotify embed */
  .player-section {
    margin: 20px 0;
    border: 1px solid #333;
    padding: 12px;
    background: rgba(30, 215, 96, 0.05);
    position: relative;
  }
  .player-section .label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #1DB954;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .player-section iframe {
    border-radius: 4px;
  }

  /* Links */
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 20px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    border: 1px solid;
    text-decoration: none;
    font-family: 'VT323', monospace;
    font-size: 22px;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .link-btn::before {
    content: '>';
    font-size: 18px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .link-btn:hover::before { opacity: 1; }
  .link-btn:hover {
    padding-left: 28px;
    text-shadow: 0 0 8px currentColor;
    box-shadow: 0 0 15px currentColor, inset 0 0 15px rgba(255,255,255,0.05);
  }

  .link-btn .icon { font-size: 24px; }

  .link-btn.spotify { color: #1DB954; border-color: #1DB954; }
  .link-btn.youtube { color: #FF0000; border-color: #FF0000; }
  .link-btn.tiktok { color: var(--neon-pink); border-color: var(--neon-pink); }
  .link-btn.instagram { color: var(--neon-orange); border-color: var(--neon-orange); }
  .link-btn.twitter { color: var(--neon-blue); border-color: var(--neon-blue); }
  .link-btn.github { color: #fff; border-color: #fff; }

  /* Under construction GIF zone */
  .construction {
    text-align: center;
    margin: 30px 0 10px;
    font-size: 14px;
    color: var(--neon-yellow);
    animation: blink 1.5s step-end infinite;
  }

  /* ASCII art divider */
  .divider {
    text-align: center;
    font-size: 12px;
    color: #444;
    margin: 20px 0;
    font-family: 'Space Mono', monospace;
    user-select: none;
  }

  /* Guestbook / footer */
  .footer {
    text-align: center;
    margin-top: 30px;
    font-size: 13px;
    font-family: 'Space Mono', monospace;
    color: #555;
  }
  .footer a {
    color: var(--neon-green);
    text-decoration: none;
  }
  .footer a:hover { text-decoration: underline; }

  /* Floating decorations */
  .deco {
    position: fixed;
    font-size: 24px;
    opacity: 0.15;
    animation: float 6s ease-in-out infinite;
    pointer-events: none;
    z-index: 5;
  }

  /* Mobile */
  @media (max-width: 520px) {
    .container { padding: 24px 16px 50px; }
    .header h1 { font-size: 38px; }
    .link-btn { font-size: 19px; padding: 12px 14px; }
  }
</style>
</head>
<body>

<div class="marquee-bar">
  <span id="marquee-text"></span>
</div>

<div class="stars" id="stars"></div>

<div class="container">
  <div class="hit-counter">
    visitors: <span class="count" id="visitor-count"></span>
  </div>

  <div class="header">
    <h1>The Local</h1>
    <div class="tagline">
      <span id="tagline-text"></span><span class="cursor">_</span>
    </div>
  </div>

  <div class="greeting" id="greeting"></div>

  <div class="divider" id="divider-top"></div>

  <div class="player-section">
    <div class="label" id="player-label">/// now playing ///</div>
    <iframe
      style="border-radius:12px"
      src="https://open.spotify.com/embed/show/1GipBGmWYyH8rWEuYTZjLf?utm_source=generator&theme=0"
      width="100%"
      height="152"
      frameBorder="0"
      allowfullscreen=""
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy">
    </iframe>
  </div>

  <div class="divider" id="divider-mid"></div>

  <div class="links" id="links"></div>

  <div class="construction" id="construction"></div>

  <div class="divider" id="divider-bottom"></div>

  <div class="footer">
    <span id="footer-flavor"></span><br>
    <span style="color:#333">&copy; 2026 The Local &bull; Bay Area, CA</span>
  </div>
</div>

<script>
// ============================================================
// RANDOMIZATION ENGINE — different experience every visit
// ============================================================

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

// --- Greetings (randomized each visit) ---
const greetings = [
  "Welcome to the internet's favorite Bay Area podcast.",
  "You found us. Now stay awhile.",
  "Broadcasting live from the fog.",
  "Where SF meets the microphone.",
  "The people who make this city what it is.",
  "Pull up a chair. We saved you a seat.",
  "Dispatches from the most interesting city on earth.",
  "Warning: may cause strong opinions about burritos.",
  "You're now entering the Bay Area.",
  "Another day, another incredible human.",
  "This page is best viewed at 1024x768.",
  "Loading Bay Area vibes...",
  "Now with 100% more local flavor.",
  "Certified San Francisco content.",
  "The algorithm brought you here. Stay for the stories.",
  "Every guest has a story. Every story has a city.",
];

// --- Taglines (typed out with cursor effect) ---
const taglines = [
  "a local bay area podcast",
  "the people who make this city",
  "culture // tech // politics // climate",
  "san francisco, unfiltered",
  "stories from the bay",
  "locally sourced conversations",
  "the fabric of the bay area",
  "powered by curiosity and coffee",
];

// --- Marquee messages ---
const marquees = [
  "*** THE LOCAL *** Bay Area's podcast *** New episodes weekly *** Culture, Tech, Politics, Climate *** thelocalpod.link ***",
  ">>> TUNE IN >>> The stories behind the city >>> Follow @the_local_pod on everything >>> <<<",
  "~~~ THE LOCAL ~~~ Discovering the people who make SF what it is ~~~ Listen now on Spotify & YouTube ~~~",
  "### NEW EPISODE ALERT ### Check the player below ### The Bay Area never sleeps ### Subscribe everywhere ###",
  "... THE LOCAL ... broadcasting from San Francisco ... the most interesting city on earth ... listen now ...",
];

// --- ASCII dividers ---
const dividers = [
  "═══════════════════════════════════",
  "~*~*~*~*~*~*~*~*~*~*~*~*~*~*~*~*~",
  "--------------------------------",
  "▓▒░ ░▒▓▓▒░ ░▒▓▓▒░ ░▒▓▓▒░ ░▒▓",
  "<<<<<<<<<<<<<<<>>>>>>>>>>>>>>>>",
  "+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+",
  "• · • · • · • · • · • · • · • · •",
  "※ ※ ※ ※ ※ ※ ※ ※ ※ ※ ※ ※ ※ ※ ※",
];

// --- Construction messages ---
const constructions = [
  "🚧 this page is under construction 🚧",
  "🏗️ more features coming soon 🏗️",
  "⚠️ pardon our dust — big things ahead ⚠️",
  "🔧 currently vibing & building 🔧",
  "📡 signal strength: maximum 📡",
  "🌉 bridging the gap since 2026 🌉",
];

// --- Footer flavor ---
const footerFlavors = [
  'best viewed with <a href="#">Netscape Navigator 4.0</a>',
  'made with ☕ in San Francisco',
  'this site is Y2K compliant',
  'optimized for 56k modems',
  'powered by sourdough & good vibes',
  'no cookies, just conversations',
  'webmaster: <a href="https://github.com/saml212">saml212</a>',
  'HTML written by hand, like nature intended',
];

// --- Floating decorations ---
const decoEmojis = ['🌉', '☁️', '🎙️', '🎧', '📻', '🌁', '🏙️', '⚡', '🎵', '🌿', '🍵', '💻', '🎬', '🔊'];

// --- Social links with randomized order for non-primary links ---
const primaryLinks = [
  { name: 'Spotify', icon: '🎧', url: 'https://open.spotify.com/show/1GipBGmWYyH8rWEuYTZjLf', cls: 'spotify' },
  { name: 'YouTube', icon: '📺', url: 'https://youtube.com/@local-pod', cls: 'youtube' },
];
const secondaryLinks = [
  { name: 'TikTok', icon: '🎵', url: 'https://www.tiktok.com/@the_local_pod', cls: 'tiktok' },
  { name: 'Instagram', icon: '📸', url: 'https://www.instagram.com/the_local_pod/', cls: 'instagram' },
  { name: 'X / Twitter', icon: '🐦', url: 'https://x.com/the_local_pod', cls: 'twitter' },
  { name: 'GitHub', icon: '💾', url: 'https://github.com/saml212/cascade', cls: 'github' },
];

// ============================================================
// RENDER
// ============================================================

// Stars background
(function renderStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() < 0.3 ? 2 : 1;
    star.style.cssText = `
      width: ${size}px; height: ${size}px;
      top: ${Math.random() * 100}%; left: ${Math.random() * 100}%;
      --dur: ${2 + Math.random() * 4}s;
      animation-delay: ${Math.random() * 3}s;
    `;
    container.appendChild(star);
  }
})();

// Floating emoji decorations
(function renderDecos() {
  const used = new Set();
  for (let i = 0; i < 5; i++) {
    let emoji;
    do { emoji = pick(decoEmojis); } while (used.has(emoji));
    used.add(emoji);
    const el = document.createElement('div');
    el.className = 'deco';
    el.textContent = emoji;
    el.style.cssText = `
      top: ${10 + Math.random() * 70}%;
      left: ${5 + Math.random() * 85}%;
      animation-delay: ${Math.random() * 3}s;
      animation-duration: ${5 + Math.random() * 4}s;
      font-size: ${20 + Math.random() * 20}px;
      opacity: ${0.06 + Math.random() * 0.12};
    `;
    document.body.appendChild(el);
  }
})();

// Greeting
document.getElementById('greeting').textContent = pick(greetings);

// Tagline (typing effect)
const tagline = pick(taglines);
const taglineEl = document.getElementById('tagline-text');
let ti = 0;
(function typeTagline() {
  if (ti <= tagline.length) {
    taglineEl.textContent = tagline.slice(0, ti);
    ti++;
    setTimeout(typeTagline, 50 + Math.random() * 40);
  }
})();

// Marquee
document.getElementById('marquee-text').textContent = pick(marquees);

// Dividers
document.getElementById('divider-top').textContent = pick(dividers);
document.getElementById('divider-mid').textContent = pick(dividers);
document.getElementById('divider-bottom').textContent = pick(dividers);

// Construction
document.getElementById('construction').textContent = pick(constructions);

// Footer
document.getElementById('footer-flavor').innerHTML = pick(footerFlavors);

// Visitor counter (fake but fun — randomized base + localStorage increment)
(function renderCounter() {
  let count = parseInt(localStorage.getItem('thelocal_visits') || '0');
  count++;
  try { localStorage.setItem('thelocal_visits', count); } catch(e) {}
  const display = 48213 + count; // fun fake base number
  document.getElementById('visitor-count').textContent = String(display).padStart(6, '0');
})();

// Links — primary always on top, secondary shuffled
(function renderLinks() {
  const container = document.getElementById('links');
  const shuffled = [...secondaryLinks].sort(() => Math.random() - 0.5);
  const all = [...primaryLinks, ...shuffled];
  all.forEach((link, i) => {
    const a = document.createElement('a');
    a.href = link.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.className = `link-btn ${link.cls}`;
    a.innerHTML = `<span class="icon">${link.icon}</span> ${link.name}`;
    a.style.animationDelay = `${i * 0.1}s`;
    container.appendChild(a);
  });
})();

// Random neon accent color for the title each visit
(function randomAccent() {
  const accents = ['--neon-green', '--neon-pink', '--neon-blue', '--neon-yellow', '--neon-orange'];
  // Just let the rainbow animation handle it — but randomize starting hue
  const h1 = document.querySelector('.header h1');
  h1.style.animationDelay = `-${Math.random() * 6}s`;
})();

// Easter egg: Konami code shows a secret message
(function konamiEgg() {
  const code = [38,38,40,40,37,39,37,39,66,65];
  let pos = 0;
  document.addEventListener('keydown', (e) => {
    if (e.keyCode === code[pos]) {
      pos++;
      if (pos === code.length) {
        const msg = document.createElement('div');
        msg.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#000;border:2px solid var(--neon-green);padding:30px;z-index:9999;text-align:center;font-family:VT323,monospace;font-size:24px;color:var(--neon-green);';
        msg.innerHTML = '🌉 YOU FOUND THE SECRET 🌉<br><br>The Bay Area thanks you.<br>Now go listen to an episode.<br><br><small>(click to close)</small>';
        msg.onclick = () => msg.remove();
        document.body.appendChild(msg);
        pos = 0;
      }
    } else { pos = 0; }
  });
})();
</script>

</body>
</html>
